# Sampling budgets for WSA_Large multi-source pretraining.
#
# Regexes are matched against each local dataset path. First match wins.

groups:
  - name: interndata_a1
    match: "(?i)(interndata|(^|/)a1(/|$))"
    total_weight: 0.47
    inside: frames_pow
    gamma: 0.9

  - name: robotwin
    match: "(?i)robotwin"
    total_weight: 0.07
    inside: uniform

  - name: robochallenge
    match: "(?i)robochallenge"
    total_weight: 0.19
    inside: uniform

  - name: agibot
    match: "(?i)(agibot|agibotworld|a2d|r1lite)"
    total_weight: 0.17
    inside: frames_pow
    gamma: 0.8

  - name: egodex
    match: "(?i)(^|[\\\\/])egodex[^\\\\/]*([\\\\/]|$)"
    total_weight: 0.10
    inside: frames_pow
    gamma: 1.0

default:
  # This is a fail-fast sentinel, not an intended sampling bucket.
  # Any repo that reaches this block should be added to an explicit group above.
  on_match: error
  total_weight: 0.1
  inside: frames_pow
  gamma: 1.0
